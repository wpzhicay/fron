<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h1>A.D.A Solar</h1>
      <p>Sistema de Gestión de Energía Solar</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <!-- Error Message -->
      <div *ngIf="error" class="error-message">
        <span class="error-icon">⚠</span>
        {{ error }}
      </div>

      <!-- Email Input -->
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          placeholder="tu@email.com"
          class="form-control"
          [class.is-invalid]="submitted && f['email'].errors"
        />
        <div *ngIf="submitted && f['email'].errors" class="invalid-feedback">
          <span *ngIf="f['email'].errors['required']">El correo es requerido</span>
          <span *ngIf="f['email'].errors['email']">Ingrese un correo válido</span>
        </div>
      </div>

      <!-- Password Input -->
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          placeholder="Ingrese su contraseña"
          class="form-control"
          [class.is-invalid]="submitted && f['password'].errors"
        />
        <div *ngIf="submitted && f['password'].errors" class="invalid-feedback">
          <span *ngIf="f['password'].errors['required']">La contraseña es requerida</span>
          <span *ngIf="f['password'].errors['minlength']">Mínimo 6 caracteres</span>
        </div>
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        class="btn-login"
        [disabled]="isLoading || facebookLoading"
      >
        <span *ngIf="!isLoading">Iniciar Sesión</span>
        <span *ngIf="isLoading" class="spinner">⏳ Cargando...</span>
      </button>
    </form>

    <!-- Divider -->
    <div class="divider">
      <span>O</span>
    </div>

    <!-- Social Login Options -->
    <div class="social-login">
      <!-- Facebook Login Button -->
      <button
        type="button"
        (click)="loginWithFacebook()"
        [disabled]="isLoading || facebookLoading"
        class="btn-social btn-facebook"
        title="Iniciar sesión con Facebook"
      >
        <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
        </svg>
        <span *ngIf="!facebookLoading">Iniciar con Facebook</span>
        <span *ngIf="facebookLoading" class="spinner">⏳ Conectando...</span>
      </button>

      <!-- Google Login Button -->
      <button
        type="button"
        (click)="loginWithGoogle()"
        [disabled]="isLoading || googleLoading"
        class="btn-social btn-google"
        title="Iniciar sesión con Google"
      >
        <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        <span *ngIf="!googleLoading">Iniciar con Google</span>
        <span *ngIf="googleLoading" class="spinner">⏳ Conectando...</span>
      </button>
    </div>

    <!-- Register Link -->
    <div class="register-link">
      <p>¿No tienes cuenta? <a routerLink="/register" class="link">Regístrate aquí</a></p>
    </div>

    <!-- Demo Credentials -->
    <div class="demo-info">
      <p><strong>Credenciales de demo:</strong></p>
      <p>Email: <code>demo&#64;example.com</code></p>
      <p>Contraseña: <code>123456</code></p>
    </div>
  </div>

  <!-- Background decoration -->
  <div class="background-decoration">
    <div class="solar-panel-icon">☀️</div>
  </div>
</div>
